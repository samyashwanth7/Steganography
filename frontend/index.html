<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Steganography</title>
  <!-- Modern premium fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ThreeJS Canvas Background -->
<canvas id="canvas-container"></canvas>

<div class="container">
  <div class="header">
    <h1>Steganography Core</h1>
    <p class="subtitle">Additive Encoding • AES-128 • Zero Metadata</p>
  </div>

  <div class="tabs">
    <div class="tab-highlight"></div>
    <div class="tab active" id="tab-encode">Encode</div>
    <div class="tab" id="tab-decode">Decode</div>
  </div>

  <!-- ENCODE VIEW -->
  <div id="view-encode" class="view active">
    <div class="dropzone" id="drop-encode">
      <span class="drop-icon">✦</span>
      <span id="encode-filename">Click or Drag Cover Image/Audio Here</span>
      <input type="file" id="file-encode" style="display:none">
    </div>

    <div class="input-group">
      <label>Secret Key</label>
      <input type="password" id="encode-key" placeholder="Enter a strong encryption key...">
    </div>

    <div class="input-group">
      <label>Secret Message</label>
      <textarea id="encode-message" placeholder="Enter text to hide..."></textarea>
    </div>
    
    <div class="input-group">
      <label>OR Secret File (overrides text)</label>
      <div class="file-btn-wrapper">
        <button class="btn-outline" id="btn-secret-file" onclick="document.getElementById('encode-secret-file').click()">Choose File</button>
        <span class="file-name-display" id="secret-file-name">No file selected</span>
        <input type="file" id="encode-secret-file" onchange="document.getElementById('secret-file-name').innerText = this.files[0] ? this.files[0].name : 'No file selected'">
      </div>
    </div>

    <button class="primary" id="btn-encode"><span>Encode & Download</span></button>
    <div id="encode-result" class="result hidden"></div>
  </div>

  <!-- DECODE VIEW -->
  <div id="view-decode" class="view">
    <div class="dropzone" id="drop-decode">
      <span class="drop-icon">✧</span>
      <span id="decode-filename">Click or Drag Encoded Media Here</span>
      <input type="file" id="file-decode" style="display:none">
    </div>

    <div class="input-group">
      <label>Secret Key</label>
      <input type="password" id="decode-key" placeholder="Enter key to decrypt...">
    </div>

    <button class="primary" id="btn-decode"><span>Decode Secret</span></button>
    <div id="decode-result" class="result hidden"></div>
  </div>

</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // Neural Network Particle Background using Three.js
  const canvas = document.getElementById('canvas-container');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 150;

  // Particles
  const particlesGeometry = new THREE.BufferGeometry();
  const particlesCount = 300;
  const posArray = new Float32Array(particlesCount * 3);

  for(let i = 0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 500;
  }
  particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

  const material = new THREE.PointsMaterial({
    size: 1.5,
    color: 0x6366f1,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending
  });

  const particlesMesh = new THREE.Points(particlesGeometry, material);
  scene.add(particlesMesh);

  // Mouse interaction
  let mouseX = 0;
  let mouseY = 0;
  document.addEventListener('mousemove', (event) => {
    mouseX = (event.clientX / window.innerWidth) - 0.5;
    mouseY = (event.clientY / window.innerHeight) - 0.5;
  });

  // Animation Loop
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const elapsedTime = clock.getElapsedTime();

    particlesMesh.rotation.y = elapsedTime * 0.05;
    particlesMesh.rotation.x = elapsedTime * 0.02;

    // Subtle mouse tracking
    camera.position.x += (mouseX * 50 - camera.position.x) * 0.05;
    camera.position.y += (-mouseY * 50 - camera.position.y) * 0.05;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

<script src="app.js"></script>
</body>
</html>
