<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Steganography</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Steganography Core</h1>
  <p class="subtitle">Additive Encoding • AES-128 Encryption • Zero Metadata</p>

  <div class="tabs">
    <div class="tab active" id="tab-encode">Encode</div>
    <div class="tab" id="tab-decode">Decode</div>
  </div>

  <!-- ENCODE VIEW -->
  <div id="view-encode" class="view active">
    <div class="dropzone" id="drop-encode">
      <span id="encode-filename">Click or Drag Cover Image/Audio Here</span>
      <input type="file" id="file-encode" class="hidden">
    </div>

    <div class="input-group">
      <label>Secret Key</label>
      <input type="password" id="encode-key" placeholder="Enter a strong key...">
    </div>

    <div class="input-group">
      <label>Secret Message</label>
      <textarea id="encode-message" rows="3" placeholder="Enter text to hide..."></textarea>
    </div>
    
    <div class="input-group">
      <label>OR Secret File (overrides text)</label>
      <input type="file" id="encode-secret-file">
    </div>

    <button class="primary" id="btn-encode">Encode & Download</button>
    <div id="encode-result" class="result hidden"></div>
  </div>

  <!-- DECODE VIEW -->
  <div id="view-decode" class="view">
    <div class="dropzone" id="drop-decode">
      <span id="decode-filename">Click or Drag Encoded Image/Audio Here</span>
      <input type="file" id="file-decode" class="hidden">
    </div>

    <div class="input-group">
      <label>Secret Key</label>
      <input type="password" id="decode-key" placeholder="Enter key to decrypt...">
    </div>

    <button class="primary" id="btn-decode">Decode Secret</button>
    
    <div id="decode-result" class="result hidden"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
